table{width:100%;border-collapse:collapse;min-width:440px}
th{padding:7px 4px;font-size:9px;color:#555;background:#0c0c0c;border-bottom:1px solid #1e1e1e;letter-spacing:1px;white-space:nowrap}
th.lbl{text-align:left;padding-left:6px;min-width:160px}

.pct-val{font-size:10px;font-weight:700}

  {id:"o42",area:"Stratium",  label:"Calufe: crear nuevas cuentas (investigar cómo crecer cuentas de productos, no servicios)",deadline:null},
  {id:"o43",area:"Stratium",  label:"Calufe: campañas — 1 video + 6 imágenes; seguimiento TOF; evaluar y modificar SOPs",deadline:null},
  {id:"o44",area:"Stratium",  label:"Calufe: acceso LinkedIn — entender proceso B2B, crear campaña, creativos (1-2 videos y 3-4 fotos), que aprueben creativos",deadline:null},
  {id:"o45",area:"Stratium",  label:"Calufe: aprobar repartición de presupuesto",                        deadline:null},
  {id:"o46",area:"Stratium",  label:"APR: seguimiento a campaña LinkedIn Ads en curso",                  deadline:null},
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const SK="r300_may26_pwa_v1";
let rec={};
try{rec=JSON.parse(localStorage.getItem(SK)||"{}");}catch{}
const save=()=>{try{localStorage.setItem(SK,JSON.stringify(rec));}catch{}};

let curTab="diario", curWeek=1, curAf="Todas", curVm="todas";
let openWk=1, openOa=null;
const CYCLE=["","✓","½","✗"];

function cycle(k){
  const i=CYCLE.indexOf(rec[k]||"");
  const v=CYCLE[(i+1)%CYCLE.length];
  if(v==="")delete rec[k]; else rec[k]=v;
  save();
  render();
}

function sVal(s){return s==="✓"?1:s==="½"?0.5:0;}
function isOD(dl){return dl&&dl<TODAY;}
function pctCol(p){return p>=80?"#ffffff":p>=50?"#ff8800":p>0?"#cc2200":"#333";}

// ═══════════════════════════════════════════════════════
//  BUILDERS
// ═══════════════════════════════════════════════════════
function barHTML(pct,h=3){
  const col=pct>=80?"linear-gradient(90deg,#aaa,#fff)":pct>=50?"#ff8800":pct>0?"#cc2200":"#1e1e1e";
  const sh=pct>=80?"0 0 6px rgba(255,255,255,.3)":"none";
  return `<div class="bar-wrap" style="height:${h}px"><div class="bar-fill" style="width:${pct}%;background:${col};box-shadow:${sh};min-width:${pct>0?2:0}px"></div></div>`;
}

function sbtnHTML(k){
  const v=rec[k]||"";
  const cls=v==="✓"?"done":v==="½"?"half":v==="✗"?"miss":"";
  return `<button class="sbtn ${cls}" onclick="cycle('${k}')">${v||"·"}</button>`;
}

function taskRowHTML(k,label,deadline,showArea,area){
  const v=rec[k]||"";
  const od=isOD(deadline)&&v!=="✓";
  const ac=AREA_COLOR[area]||"#ff4400";
  const pill=showArea?`<span class="area-pill" style="background:${ac}18;color:${ac}">${area}</span>`:"";
  const dl=deadline
    ?`<div class="task-dl ${od?"overdue":""}">${od?"⚠ VENCIDO · ":""}${deadline}</div>`
    :`<div class="task-nf">sin fecha fija</div>`;
  return `<div class="task-row ${od?"overdue":""}">
    ${sbtnHTML(k)}
    <div style="flex:1;min-width:0">
      <div class="task-label ${od?"overdue":""}">${label}</div>
      ${dl}
    </div>
    ${pill}
  </div>`;
}

function areaFilterHTML(){
  const btns=["Todas",...AREAS].map(a=>{
    const ac=AREA_COLOR[a]||"#cc2200";
    const act=curAf===a;
    return `<button class="area-btn" style="${act?`border-color:${ac};background:${ac}18;color:${ac}`:""}\" onclick="setAf('${a}')">${a}</button>`;
  }).join("");
  return `<div class="area-bar">${btns}</div>`;
}

// ═══════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════
function renderDiario(){
  const wDays=MAY.filter(d=>d.week===curWeek);
  const tasks=DAILY.filter(t=>curAf==="Todas"||t.area===curAf);

  const weekBtns=[1,2,3,4].map(w=>`
    <button class="week-btn ${curWeek===w?"active":""}" onclick="setWeek(${w})">S${w} — ${["4-10","11-17","18-24","25-31"][w-1]}</button>
  `).join("");

  const vmBtn=`<button class="view-btn" onclick="toggleVm()">${curVm==="todas"?"▤ por área":"▦ todo junto"}</button>`;

  function tableHTML(list){
    const heads=wDays.map(d=>`
      <th>
        <span class="dow">${d.dow}</span>
        <span class="dn ${d.iso===TODAY?"today":""}">${d.d}</span>
      </th>`).join("");

    const rows=list.map(task=>{
      const rel=wDays.filter(d=>task.days.includes(d.dow));
      const pct=rel.length>0
        ?Math.round(rel.reduce((s,d)=>s+sVal(rec[`d_${task.id}_${d.iso}`]||""),0)/rel.length*100)
        :null;

      const cells=wDays.map(d=>{
        const k=`d_${task.id}_${d.iso}`;
        const on=task.days.includes(d.dow);
        if(!on) return `<td class="cell-center"><span class="dash">—</span></td>`;
        const v=rec[k]||"";
        const cls=v==="✓"?"done":v==="½"?"half":v==="✗"?"miss":"";
        return `<td class="cell-center"><button class="sbtn ${cls}" onclick="cycle('${k}')">${v||"·"}</button></td>`;
      }).join("");

      const pctTd=pct!=null
        ?`<td class="cell-center"><span class="pct-val" style="color:${pctCol(pct)}">${pct}%</span></td>`
        :`<td class="cell-center"><span style="color:#1e1e1e">—</span></td>`;

      return `<tr><td class="lbl">${task.label}</td>${cells}${pctTd}</tr>`;
    }).join("");

    return `<div class="tbl-wrap"><table>
      <thead><tr><th class="lbl">Hábito</th>${heads}<th>%</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }

  let body="";
  if(curVm==="todas"){
    body=tableHTML(tasks);
  } else {
    AREAS.forEach(a=>{
      const t=tasks.filter(x=>x.area===a);
      if(!t.length)return;
      const ac=AREA_COLOR[a];
      body+=`<div class="area-hdr" style="border-color:${ac}33">
        <div class="area-dot" style="background:${ac}"></div>
        <span class="area-name" style="color:${ac}">${a.toUpperCase()}</span>
      </div>${tableHTML(t)}`;
    });
  }

  return `<div class="week-bar">${weekBtns}<div class="divider"></div>${vmBtn}</div>${areaFilterHTML()}${body}`;
}

function renderSemanal(){
  const filtered=WEEKLY.filter(t=>curAf==="Todas"||t.area===curAf);
  let html=areaFilterHTML();
  [1,2,3,4].forEach(w=>{
    const wt=filtered.filter(t=>t.week===w);
    if(!wt.length)return;
    const sc=wt.reduce((s,t)=>s+sVal(rec[`w_${t.id}`]||""),0);
    const pct=Math.round(sc/wt.length*100);
    const open=openWk===w;
    const rows=open?wt.map(t=>taskRowHTML(`w_${t.id}`,t.label,t.deadline||null,curAf==="Todas",t.area)).join(""):"";
    html+=`<div>
      <button class="sec-btn ${open?"open":""}" onclick="toggleWk(${w})">
        <span class="sec-label">SEMANA ${w}</span>
        ${barHTML(pct)}
        <span class="sec-pct" style="color:${pctCol(pct)}">${pct}%</span>
        <span class="sec-arrow">${open?"▲":"▼"}</span>
      </button>
      ${rows}
    </div>`;
  });
  return html;
}

function renderProyecto(){
  const filtered=ONCE.filter(t=>curAf==="Todas"||t.area===curAf);
  let html=areaFilterHTML();
  AREAS.forEach(a=>{
    const tasks=filtered.filter(t=>t.area===a);
    if(!tasks.length)return;
    const ac=AREA_COLOR[a];
    const sc=tasks.reduce((s,t)=>s+sVal(rec[`o_${t.id}`]||""),0);
    const pct=Math.round(sc/tasks.length*100);
    const done=tasks.filter(t=>rec[`o_${t.id}`]==="✓").length;
    const open=openOa===a;
    const rows=open?tasks.map(t=>taskRowHTML(`o_${t.id}`,t.label,t.deadline||null,false,t.area)).join(""):"";
    html+=`<div>
      <button class="sec-btn ${open?"open":""}" style="${open?`border-color:${ac};background:${ac}11`:""}" onclick="toggleOa('${a}')">
        <div class="area-dot" style="background:${ac}"></div>
        <span class="sec-label" style="color:${ac}">${a.toUpperCase()}</span>
        <span style="font-size:9px;color:#555;margin-right:4px">${done}/${tasks.length}</span>
        ${barHTML(pct)}
        <span class="sec-pct" style="color:${pctCol(pct)}">${pct}%</span>
        <span class="sec-arrow">${open?"▲":"▼"}</span>
      </button>
      ${rows}
    </div>`;
  });
  return html;
}

function renderGrafica(){
  const WK_BOUNDS=[[4,10],[11,17],[18,24],[25,31]];

  function weekPct(fa,w){
    const i=w-1;
    const s=`2026-05-${String(WK_BOUNDS[i][0]).padStart(2,"0")}`;
    const e=`2026-05-${String(WK_BOUNDS[i][1]).padStart(2,"0")}`;
    const wDays=MAY.filter(d=>d.week===w);
    let total=0,score=0;
    DAILY.filter(t=>fa==="Todas"||t.area===fa).forEach(t=>wDays.filter(d=>t.days.includes(d.dow)).forEach(d=>{total++;score+=sVal(rec[`d_${t.id}_${d.iso}`]||"");}));
    WEEKLY.filter(t=>(fa==="Todas"||t.area===fa)&&t.week===w).forEach(t=>{total++;score+=sVal(rec[`w_${t.id}`]||"");});
    ONCE.filter(t=>(fa==="Todas"||t.area===fa)&&t.deadline&&t.deadline>=s&&t.deadline<=e).forEach(t=>{total++;score+=sVal(rec[`o_${t.id}`]||"");});
    return total>0?Math.round(score/total*100):0;
  }

  let gT=0,gS=0;
  DAILY.forEach(t=>MAY.filter(d=>t.days.includes(d.dow)).forEach(d=>{gT++;gS+=sVal(rec[`d_${t.id}_${d.iso}`]||"");}));
  WEEKLY.forEach(t=>{gT++;gS+=sVal(rec[`w_${t.id}`]||"");});
  ONCE.forEach(t=>{gT++;gS+=sVal(rec[`o_${t.id}`]||"");});
  const gP=gT>0?Math.round(gS/gT*100):0;
  const gCol=gP>=80?"#ffffff":gP>=50?"#ff8800":"#cc2200";
  const gSt=gP>=80?"✓ PARETO CUMPLIDO":gP>=50?"— EN PROGRESO":"✗ BAJO LA META";

  // SVG line chart
  const W=520,H=180,PL=36,PT=16,PB=36,PR=16;
  const cW=W-PL-PR,cH=H-PT-PB;
  const xs=[0,1,2,3].map(i=>PL+i/3*cW);
  const ys=v=>PT+cH-(v/100)*cH;

  const lines=[
    {label:"Global",color:"#ffffff",width:2.5,data:[1,2,3,4].map(w=>weekPct("Todas",w))},
    ...AREAS.map(a=>({label:a,color:AREA_COLOR[a],width:1.5,data:[1,2,3,4].map(w=>weekPct(a,w))})),
  ];

  function makePath(data){
    const pts=data.map((v,i)=>[xs[i],ys(v)]);
    if(pts.length<2)return"";
    let d=`M ${pts[0][0]} ${pts[0][1]}`;
    for(let i=0;i<pts.length-1;i++){
      const [x0,y0]=pts[i],[x1,y1]=pts[i+1];
      const cx=(x0+x1)/2;
      d+=` C ${cx} ${y0}, ${cx} ${y1}, ${x1} ${y1}`;
    }
    return d;
  }

  const gridLines=[0,25,50,75,100].map(v=>`
    <line x1="${PL}" y1="${ys(v)}" x2="${W-PR}" y2="${ys(v)}"
      stroke="${v===80?"#cc220044":"#1e1e1e"}" stroke-width="${v===80?1.5:1}"
      stroke-dasharray="${v===80?"4 3":"none"}"/>
    <text x="${PL-4}" y="${ys(v)+4}" text-anchor="end" fill="#444" font-size="9">${v}</text>
  `).join("");

  const wkLabels=[1,2,3,4].map((w,i)=>`
    <text x="${xs[i]}" y="${H-6}" text-anchor="middle" fill="#444" font-size="9">S${w}</text>
  `).join("");

  const linesHTML=lines.map(l=>{
    const dots=l.data.map((v,i)=>`<circle cx="${xs[i]}" cy="${ys(v)}" r="${l.label==="Global"?4:3}" fill="${l.color}" opacity="${l.label==="Global"?1:.8}"/>`).join("");
    return `<path d="${makePath(l.data)}" fill="none" stroke="${l.color}" stroke-width="${l.width}" stroke-opacity="${l.label==="Global"?1:.7}"/>${dots}`;
  }).join("");

  const legend80=`<text x="${W-PR+2}" y="${ys(80)+4}" fill="#cc2200" font-size="8">80%</text>`;

  const legendItems=lines.map(l=>`
    <div class="leg-item">
      <div class="leg-line" style="background:${l.color}"></div>
      <span class="leg-lbl">${l.label}</span>
    </div>`).join("");

  // Area bars
  const areaBars=AREAS.map(a=>{
    let t=0,s=0;
    DAILY.filter(x=>x.area===a).forEach(x=>MAY.filter(d=>x.days.includes(d.dow)).forEach(d=>{t++;s+=sVal(rec[`d_${x.id}_${d.iso}`]||"");}));
    WEEKLY.filter(x=>x.area===a).forEach(x=>{t++;s+=sVal(rec[`w_${x.id}`]||"");});
    ONCE.filter(x=>x.area===a).forEach(x=>{t++;s+=sVal(rec[`o_${x.id}`]||"");});
    const p=t>0?Math.round(s/t*100):0;
    const ac=AREA_COLOR[a];
    const fill=p>=80?`linear-gradient(90deg,${ac},#fff)`:ac;
    const sh=p>=80?"0 0 5px rgba(255,255,255,.25)":"none";
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:10px;color:${ac};font-weight:700">${a}</span>
        <span style="font-size:10px;font-weight:700;color:${pctCol(p)}">${p}%</span>
      </div>
      <div style="height:6px;border-radius:2px;background:#1e1e1e;overflow:hidden">
        <div style="width:${p}%;height:100%;background:${fill};box-shadow:${sh};transition:width .4s;min-width:${p>0?2:0}px"></div>
      </div>
    </div>`;
  }).join("");

  return `
    <div class="global-card" style="border-color:${gP>=80?"rgba(255,255,255,.25)":"#1e1e1e"};box-shadow:${gP>=80?"0 0 30px rgba(255,255,255,.05)":"none"}">
      <div>
        <div style="font-size:9px;color:#555;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">Cumplimiento Global</div>
        <div class="global-num" style="color:${gCol};text-shadow:${gP>=80?"0 0 24px rgba(255,255,255,.4)":"none"}">${gP}<span style="font-size:20px">%</span></div>
        <div class="global-sub">${Math.round(gS)}/${gT} pts · meta pareto: 80%</div>
      </div>
      <div style="flex:1;min-width:120px">
        ${barHTML(gP,6)}
        <div class="global-status" style="color:${gCol}">${gSt}</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Curvas de avance semanal</div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
        ${gridLines}${legend80}${wkLabels}${linesHTML}
      </svg>
      <div class="legend">${legendItems}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Acumulado por área</div>
      ${areaBars}
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const content=document.getElementById("content");
  if(curTab==="diario")     content.innerHTML=renderDiario();
  else if(curTab==="semanal")  content.innerHTML=renderSemanal();
  else if(curTab==="proyecto") content.innerHTML=renderProyecto();
  else                         content.innerHTML=renderGrafica();

  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.classList.toggle("active",b.textContent.trim().toLowerCase()===
      {diario:"diario",semanal:"semanal",proyecto:"proyectos",grafica:"gráfica"}[curTab]);
  });
}

// ═══════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════
function showTab(t){curTab=t;curAf="Todas";render();}
function setWeek(w){curWeek=w;render();}
function setAf(a){curAf=a;render();}
function toggleVm(){curVm=curVm==="todas"?"area":"todas";render();}
function toggleWk(w){openWk=openWk===w?null:w;render();}
function toggleOa(a){openOa=openOa===a?null:a;render();}

render();
</script>
</body>
</html>
